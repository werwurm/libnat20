name: lcov-test-coverage-report

on:
  push:
    branches:
      - main

jobs:
  lcov-test-coverage-report:
    strategy:
      matrix:
        options:
          [
            {
              extra_cmake_args: " -DCMAKE_BUILD_TYPE=Debug -DNAT20_WITH_TESTS=ON -DNAT20_WITH_CRYPTO_BSSL=ON -DNAT20_WITH_COVERAGE=ON",
              extra_targets: "",
            },
          ]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b #v4.1.5
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@802fa1a2c4e212495c05bf94dba2704a92a472be #v2.0.2
        with:
          cmake-version: "3.22.x"
      - name: Install lcov
        run: |
          sudo apt update
          sudo apt install lcov -y
      - name: Generate
        run: cmake -S . -B cmake/build ${{ matrix.options.extra_cmake_args }}
      - name: Build and test
        run: cmake --build cmake/build -j $(( $(nproc) + 1 )) --target coverage ${{ matrix.options.extra_targets }}
      - name: Report code coverage
        uses: zgosalvez/github-actions-report-lcov@eda775f552bfb2bffbdedea26f19dfb8c24a1648 #v4.1.26
        with:
          coverage-files: "cmake/build/coverage.info"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: "LCov Test Coverage Report"
          update-comment: true
